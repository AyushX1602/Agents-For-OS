<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/apple-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Spirit OS is an accessible, AI-powered desktop operating system that runs entirely in the browser — with voice, gestures, eye tracking, sign language, and an AI assistant that can execute real OS-level actions." />
    <meta name="keywords" content="Spirit OS, accessibility, AI desktop, voice control, eye tracking, sign language, browser OS, assistive technology" />
    <meta property="og:title" content="Spirit OS — Accessible AI desktop that runs in the browser" />
    <meta property="og:description" content="Voice, gestures, eye tracking, sign language, and an AI assistant that runs real OS-level actions — no install required." />
    <meta property="og:image" content="/img/og/og-home.png" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <title>Spirit OS — Accessible AI desktop that runs in the browser</title>

    <!-- Camera + microphone permissions policy for eye tracking -->
    <meta http-equiv="Permissions-Policy" content="camera=*, microphone=*">

    <!-- Google Fonts - from design -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Geist:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">

    <style>
      /* Custom scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: rgba(255, 255, 255, 0.02);
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.1);
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: rgba(255, 255, 255, 0.15);
      }

      /* Global font smoothing */
      * {
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      /* Body base styles — neutral until React mounts and applies theme */
      body {
        font-family: 'Geist', system-ui, sans-serif;
        background: #f5f5f7;
        color: #1a1a1a;
      }

      /* Material Symbols Outlined */
      .material-symbols-outlined {
        font-family: 'Material Symbols Outlined';
        font-weight: normal;
        font-style: normal;
        font-size: 24px;
        line-height: 1;
        letter-spacing: normal;
        text-transform: none;
        display: inline-block;
        white-space: nowrap;
        word-wrap: normal;
        direction: ltr;
        -webkit-font-feature-settings: 'liga';
        font-feature-settings: 'liga';
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <!-- MediaPipe Hands assets are served locally from /mediapipe-hands/ -->
    <!-- (copied from node_modules/@mediapipe/hands via prebuild script) -->

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
