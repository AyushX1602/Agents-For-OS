<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Camera + microphone permissions policy for eye tracking -->
    <meta http-equiv="Permissions-Policy" content="camera=*, microphone=*">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%235b5fc7'/><text x='16' y='23' font-size='18' text-anchor='middle' fill='white' font-family='system-ui'>S</text></svg>">
    <title>SpiritOS</title>

    <!-- Google Fonts - from design -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Geist:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">

    <style>
      /* Custom scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: rgba(255, 255, 255, 0.02);
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.1);
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: rgba(255, 255, 255, 0.15);
      }

      /* Global font smoothing */
      * {
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      /* Body base styles — neutral until React mounts and applies theme */
      body {
        font-family: 'Geist', system-ui, sans-serif;
        background: #f5f5f7;
        color: #1a1a1a;
      }

      /* Material Symbols Outlined */
      .material-symbols-outlined {
        font-family: 'Material Symbols Outlined';
        font-weight: normal;
        font-style: normal;
        font-size: 24px;
        line-height: 1;
        letter-spacing: normal;
        text-transform: none;
        display: inline-block;
        white-space: nowrap;
        word-wrap: normal;
        direction: ltr;
        -webkit-font-feature-settings: 'liga';
        font-feature-settings: 'liga';
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <!-- MediaPipe Hands assets are served locally from /mediapipe-hands/ -->
    <!-- (copied from node_modules/@mediapipe/hands via prebuild script) -->

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
